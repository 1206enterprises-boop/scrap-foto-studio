<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visura Haus - Signup / Sign-In</title>
<style>
  body {
    margin:0; padding:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex; justify-content:center; align-items:center;
    background: radial-gradient(circle at top, #000 0%, #111 100%);
    color: #fff;
  }
  .signup-box {
    display:flex; flex-direction:column; align-items:center;
    background:#111; border:2px solid #FFD700; border-radius:20px;
    padding:40px 30px; width:350px; box-shadow:0 0 60px rgba(255,215,0,0.5);
    text-align:center;
  }
  .signup-box img.logo { width:120px; margin-bottom:20px; }
  h2 { color:#FFD700; margin:0 0 10px; }
  p { color:#ccc; font-size:14px; margin-bottom:20px; }
  input {
    width:90%; max-width:280px; padding:14px; margin-bottom:15px;
    border-radius:10px; border:1px solid #FFD700; background:#222;
    color:#fff; font-size:14px; box-sizing:border-box;
  }
  input:focus { outline:none; border-color:#fff; box-shadow:0 0 10px rgba(255,215,0,0.7); }
  button {
    width:90%; max-width:280px; padding:14px; margin-top:5px;
    border:none; border-radius:10px; background:linear-gradient(135deg,#FFD700,#e6c200);
    color:#000; font-weight:bold; cursor:pointer; font-size:16px; transition:all 0.3s ease;
  }
  button:hover { background:linear-gradient(135deg,#e6c200,#ccaa00); transform:translateY(-2px); }
  .toggle { margin-top:15px; font-size:13px; color:#ccc; cursor:pointer; text-decoration:underline; }
  .error { color:#ff5555; font-size:13px; min-height:18px; }
</style>
</head>
<body>

<div class="signup-box">
  <img src="https://static.wixstatic.com/media/67478d_07b399da6cec4eedabdc9ff31dce1feb~mv2.png" class="logo">
  <h2>Visura Haus</h2>
  <p id="form-title">Sign Up with your email</p>

  <input type="email" id="emailInput" placeholder="Enter your email" required>
  <input type="password" id="passwordInput" placeholder="Enter a password">
  <div class="error" id="errorMsg"></div>
  <button id="submitBtn">Continue</button>

  <div class="toggle" id="toggleMode">Already have an account? Sign In</div>
</div>

<script>
const submitBtn = document.getElementById("submitBtn");
const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const errorMsg = document.getElementById("errorMsg");
const toggleMode = document.getElementById("toggleMode");
const formTitle = document.getElementById("form-title");

let isSignUp = true;

// Wix endpoint URL
const WIX_ENDPOINT = "https://your-wix-site.com/_functions/collectEmail";

toggleMode.addEventListener("click", () => {
  isSignUp = !isSignUp;
  formTitle.textContent = isSignUp ? "Sign Up with your email" : "Sign In";
  submitBtn.textContent = isSignUp ? "Continue" : "Sign In";
  toggleMode.textContent = isSignUp ? "Already have an account? Sign In" : "Need an account? Sign Up";
  errorMsg.textContent = "";
});

function isValidEmail(email) {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailRegex.test(email);
}

function saveEmailForMarketing(email) {
  // Send to Wix
  fetch(WIX_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  }).catch(console.error);

  // Also store locally
  let emails = JSON.parse(localStorage.getItem("marketingEmails") || "[]");
  if (!emails.includes(email)) emails.push(email);
  localStorage.setItem("marketingEmails", JSON.stringify(emails));
}

submitBtn.addEventListener("click", () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if (!email) { errorMsg.textContent="Email is required."; return; }
  if (!isValidEmail(email)) { errorMsg.textContent="Enter a valid email."; return; }
  if (isSignUp && !password) { errorMsg.textContent="Password is required for sign up."; return; }

  const storedUsers = JSON.parse(localStorage.getItem("users") || "{}");

  if (isSignUp) {
    if (storedUsers[email]) { errorMsg.textContent="Email already exists. Sign In."; return; }
    storedUsers[email] = password;
    localStorage.setItem("users", JSON.stringify(storedUsers));

    // Save email to Wix
    saveEmailForMarketing(email);

    localStorage.setItem("visuraEmail", email);
    localStorage.setItem("visuraLoggedIn", "true");
    window.location.href = "index.html";
  } else {
    if (!storedUsers[email] || storedUsers[email] !== password) {
      errorMsg.textContent="Invalid email or password.";
      return;
    }
    localStorage.setItem("visuraEmail", email);
    localStorage.setItem("visuraLoggedIn", "true");
    window.location.href = "index.html";
  }
});

// Auto redirect if already logged in
if (localStorage.getItem("visuraLoggedIn") === "true") {
  window.location.href = "index.html";
}
</script>

</body>
</html>
